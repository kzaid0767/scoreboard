<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Score Board</title>
</head>
<body>
    <div class="container">
        <div>
            <h3 class="cont-h3">HOME</h3>
            <div class="scorediv" id="homeSpan">0</div>
            <div class="divbutton">
                <button id="home1" onclick="add1()">+1</button>
                <button id="home2" onclick="add2()">+2</button>
                <button id="home3" onclick="add3()">+3</button>
            </div>
        </div>
        <button id="newGame" onclick="newGame()">New Game</button>
        <div>
            <h3 class="cont-h3">GUEST</h3>
            <div class="scorediv" id="guestSpan">0</div>
            <div class="divbutton">
                <button onclick="gadd1()">+1</button>
                <button onclick="gadd2()">+2</button>
                <button onclick="gadd3()">+3</button>
            </div>
            
        </div>
        
    </div>
    
    <script src="index.js"></script>
</body>
</html>
